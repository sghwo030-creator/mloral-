<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOSS SOLL - 'Ain Asylum (Fixed Localization)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; user-select: none; color: #fff; }
        
        /* UI Screens Overlay Styling */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(10, 10, 10, 0.98); z-index: 100; text-align: center; }
        .box-panel { background: #111; padding: 30px; border: 2px solid #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); border-radius: 5px; min-width: 300px; }
        h1 { color: #ff0000; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,0,0,0.6); }
        
        input[type="text"], select { background: #222; border: 1px solid #555; color: #fff; padding: 10px; margin: 10px 0; width: 90%; font-family: monospace; font-size: 16px; }
        input[type="range"] { width: 100%; accent-color: #ff0000; }
        
        button { background: #ff0000; color: #fff; border: none; padding: 12px 25px; font-size: 18px; font-family: monospace; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; border-radius: 3px; }
        button:hover { background: #b30000; box-shadow: 0 0 10px #ff0000; }
        
        /* Loading Bar */
        .progress-container { width: 90%; background-color: #222; border: 1px solid #ff0000; height: 25px; margin-top: 20px; position: relative; }
        .progress-bar { width: 0%; height: 100%; background-color: #ff0000; transition: width 0.1s; }
        #loading-text { font-size: 14px; margin-top: 10px; color: #aaa; }

        /* Game HUD Layout */
        #game-hud { position: absolute; top: 20px; left: 20px; z-index: 10; font-weight: bold; display: none; }
        #hud-distance { color: #ff0000; font-size: 22px; text-shadow: 2px 2px #000; }
        #hud-status { color: #fff; font-size: 15px; margin-top: 5px; text-shadow: 1px 1px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); display: none; z-index: 5; }
        #instructions { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #fff; font-size: 16px; text-shadow: 1px 1px #000; line-height: 1.5; display: none; z-index: 5; }
        
        /* Subtitle / Monolog Box */
        #monologue-box { position: absolute; bottom: 10%; width: 100%; text-align: center; font-size: 20px; color: #ffffaa; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 10; display: none; padding: 0 50px; box-sizing: border-box; }
        
        #canvas-container { width: 100vw; height: 100vh; }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- CROSSHAIR & INSTRUCTIONS -->
    <div id="crosshair"></div>
    <div id="instructions"></div>
    
    <!-- 1. LOGIN SCREEN -->
    <div id="login-screen" class="overlay-screen">
        <div class="box-panel">
            <h1>THE LOSS SOLL</h1>
            <label>MASUKKAN NAMA PASIEN:</label><br>
            <input type="text" id="username" placeholder="Nama Anda..." value="Player1">
            <button onclick="processLogin()">LOGIN</button>
        </div>
    </div>

    <!-- 2. LOADING SCREEN (DOWNLOAD SIMULATOR) -->
    <div id="loading-screen" class="overlay-screen hidden">
        <div class="box-panel" style="width: 400px;">
            <h2>MENGUNDUH DATA GAIB...</h2>
            <div class="progress-container">
                <div id="p-bar" class="progress-bar"></div>
            </div>
            <div id="loading-text">Menghubungkan ke server...</div>
        </div>
    </div>

    <!-- 3. MAIN MENU & SETTINGS SCREEN -->
    <div id="menu-screen" class="overlay-screen hidden">
        <div class="box-panel" style="width: 350px;">
            <h1>MAIN MENU</h1>
            <button onclick="startGame()" style="width: 100%; font-size: 22px; margin-bottom: 20px;">MULAI GAME</button>
            <hr style="border-color: #333;">
            <h3 style="color: #ff0000; margin-top: 15px;">PENGATURAN / SETTINGS</h3>
            
            <label>Bahasa / Language:</label>
            <select id="setting-lang">
                <option value="id">Indonesia</option>
                <option value="en">English</option>
            </select>

            <label>Sensitivitas Mouse:</label>
            <input type="range" id="setting-sens" min="1" max="10" value="5">

            <div style="margin-top: 15px; text-align: left; padding-left: 10px;">
                <input type="checkbox" id="setting-filter" checked>
                <label for="setting-filter" style="color: #ffaaaa; cursor: pointer;">Sensor Kata Kasar (ON)</label>
            </div>
        </div>
    </div>

    <!-- 4. GAME OVER / WIN OVERLAY -->
    <div id="screen-overlay" class="overlay-screen hidden">
        <div id="overlay-text" style="font-size: 40px; font-weight: bold; margin-bottom: 10px;">GAME OVER</div>
        <button id="restart-btn" onclick="resetGame()">Coba Lagi</button>
    </div>

    <!-- 5. GAME UI INTERFACE -->
    <div id="game-hud">
        <div id="hud-distance"><span id="lbl-distance">Sisa Jarak: </span><span id="distance">1000</span>m</div>
        <div id="hud-status"><span id="lbl-status">Status: </span><span id="m-state">...</span></div>
    </div>
    <div id="monologue-box"></div>

    <div id="canvas-container"></div>

    <script>
        // Game Engine Variables
        let scene, camera, renderer, monster, door;
        let lights = [];
        let gameOver = false;
        let gameActive = false;
        let monsterSpawned = false;
        let monsterEyes = [];
        
        let keys = { w: false, a: false, s: false, d: false, shift: false };
        const totalDistance = 1000;
        const finishLine = -totalDistance; 
        let normalSpeed = 0.08;
        let sprintSpeed = 0.18;
        
        let monsterSpeed = 0;
        let monsterTimer = 0;
        let monsterState = "idle"; 

        // Config & Settings
        let config = {
            username: "Player",
            lang: "id",
            sensitivity: 0.0025,
            profanityFilter: true
        };

        let triggeredMonologue2 = false;

        // ==========================================================
        // KAMUS KAMUS KAMUS - MASTER LOCALIZATION DICTIONARY
        // ==========================================================
        const translations = {
            id: {
                distanceLabel: "Sisa Jarak: ",
                statusLabel: "Status: ",
                statusQuiet: "Suasana sunyi... berjalanlah ke depan.",
                instructions: "KLIK LAYAR UNTUK MENGUNCI CURSOR MOUSE<br>Gunakan [W, A, S, D] untuk bergerak | Tahan [SHIFT] untuk Sprint lari kencang",
                asthma: "*Napas Berat* (Jiwa Asma: Monster Melambat!)",
                crying: "*SUARA BAYI MENANGIS HISTERIS* (MATA NYA MELOTOT DAN MENGAMUK!!)",
                win: "KAMU BERHASIL LOLOS DARI TEROR 'AIN!",
                lose: "THE LOSS SOLL MEMAKAN JIWAMU!",
                restartBtn: "Coba Lagi",
                monologueStart: (name) => `[${name}]: Sial... kepala gua pusing. Tempat apaan ini? Gelap banget, gua harus nyari jalan keluar lewat depan...`,
                monologueChase: (name) => `[${name}]: BANGSAT! Suara apaan itu di belakang?! ANJING, dia ngejar gua! BANGSAT, ANAK ASU, MONSTER ANJING!!! LARI!!!!`,
                monologueReset: (name) => `[${name}]: Sial... gua balik lagi ke ujung lorong ini...`
            },
            en: {
                distanceLabel: "Distance Left: ",
                statusLabel: "Status: ",
                statusQuiet: "It is dead silent... keep walking forward.",
                instructions: "CLICK SCREEN TO LOCK MOUSE CURSOR<br>Use [W, A, S, D] to move | Hold [SHIFT] to Sprint",
                asthma: "*Heavy Breathing* (Asthma Soul: Monster Slowed Down!)",
                crying: "*BABY CRYING HYSTERICALLY* (EYES GLARING AND RAGING!!)",
                win: "YOU SUCCESSFULLY ESCAPED THE 'AIN TERROR!",
                lose: "THE LOSS SOLL CONSUMED YOUR SOUL!",
                restartBtn: "Try Again",
                monologueStart: (name) => `[${name}]: Damn... my head hurts. What is this place? It's pitch black, I must find a way out ahead...`,
                monologueChase: (name) => `[${name}]: BASTARD! What the hell is that sound behind me?! SHIT, it's chasing me! SON OF A BITCH, RUN!!!!`,
                monologueReset: (name) => `[${name}]: Dammit... I'm back at the end of this corridor...`
            }
        };

        // --- PHASE 1: LOGIN ---
        function processLogin() {
            let user = document.getElementById('username').value.trim();
            if(user === "") user = "Patient-01";
            config.username = user;

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            runLoadingSimulator();
        }

        // --- PHASE 2: LOADING SCREEN ---
        function runLoadingSimulator() {
            let bar = document.getElementById('p-bar');
            let txt = document.getElementById('loading-text');
            let width = 0;
            
            let logs = [
                "Connecting to server...",
                "Downloading corridor assets...",
                "Downloading shoes... Wait, downloading audio environment files instead!",
                "Injecting 30 cursed eyes into THE LOSS SOLL...",
                "Syncing asthma victim multi-souls...",
                "Readying panic engines...",
                "Done! Opening the gates..."
            ];

            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('menu-screen').classList.remove('hidden');
                } else {
                    width += Math.random() * 5;
                    if(width > 100) width = 100;
                    bar.style.width = width + '%';
                    let logIndex = Math.floor((width / 100) * logs.length);
                    if(logIndex >= logs.length) logIndex = logs.length - 1;
                    txt.innerText = logs[logIndex] + ` (${Math.floor(width)}%)`;
                }
            }, 70);
        }

        // --- PHASE 3: APPLY SETTINGS & LANGUAGES TRANSLATIONS ---
        function applyLocalization() {
            let lang = config.lang;
            
            // Perbarui text static HUD & overlay menu berdasarkan objek translasi
            document.getElementById('lbl-distance').innerText = translations[lang].distanceLabel;
            document.getElementById('lbl-status').innerText = translations[lang].statusLabel;
            document.getElementById('instructions').innerHTML = translations[lang].instructions;
            document.getElementById('restart-btn').innerText = translations[lang].restartBtn;
            
            if(!monsterSpawned) {
                document.getElementById('m-state').innerText = translations[lang].statusQuiet;
            }
        }

        function startGame() {
            config.lang = document.getElementById('setting-lang').value;
            let rawSens = document.getElementById('setting-sens').value;
            config.sensitivity = rawSens * 0.0005; 
            config.profanityFilter = document.getElementById('setting-filter').checked;

            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('instructions').style.display = 'block';
            document.getElementById('monologue-box').style.display = 'block';
            
            // Terapkan translasi bahasa terpilih sebelum game render
            applyLocalization();

            gameActive = true;
            document.body.requestPointerLock();
            
            // Panggil monolog awal game sesuai bahasa
            showMonologue(translations[config.lang].monologueStart(config.username), 4000);

            initEngine();
        }

        // --- PROFANITY FILTER ---
        function filterProfanity(text) {
            if (!config.profanityFilter) return text; 

            // Sensor kata kasar rekues lu
            let badWords = {
                "bangsat": "B*******",
                "anjing": "A*****",
                "kontol": "K*****",
                "babi": "B***",
                "asu": "A**"
            };

            let censoredText = text;
            for (let word in badWords) {
                let regex = new RegExp(word, "gi");
                censoredText = censoredText.replace(regex, badWords[word]);
            }
            return censoredText;
        }

        function showMonologue(text, duration) {
            let processedText = filterProfanity(text);
            let box = document.getElementById('monologue-box');
            box.innerText = processedText;
            box.style.display = 'block';
            
            setTimeout(() => {
                if(box.innerText === processedText) {
                    box.innerText = "";
                }
            }, duration);
        }

        // --- ENGINE ---
        function initEngine() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020202, 0.08); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 0); 
            camera.rotation.order = 'YXZ'; 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const corridorGeo = new THREE.BoxGeometry(6, 5, totalDistance + 50);
            const corridorMat = new THREE.MeshStandardMaterial({ color: 0x16221b, side: THREE.BackSide, roughness: 0.9 });
            const corridor = new THREE.Mesh(corridorGeo, corridorMat);
            corridor.position.set(0, 2.5, -totalDistance / 2);
            scene.add(corridor);

            const doorGeo = new THREE.BoxGeometry(2.5, 4, 0.2);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x4a0e0e, roughness: 0.6 });
            door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 2, finishLine);
            scene.add(door);

            // Monster
            monster = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(0.7, 1.1, 5, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a0505, roughness: 0.8, metalness: 0.2, emissive: 0x1a0000 });
            const mainBody = new THREE.Mesh(bodyGeo, bodyMat);
            monster.add(mainBody);

            for(let i = 0; i < 4; i++) {
                const ringGeo = new THREE.TorusGeometry(0.9, 0.13, 8, 16);
                const ring = new THREE.Mesh(ringGeo, bodyMat);
                ring.position.y = -1.8 + (i * 1.2);
                ring.rotation.x = Math.PI / 2;
                monster.add(ring);
            }

            const eyeGeo = new THREE.SphereGeometry(0.2, 16, 16);
            const pupilGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const scleraMat = new THREE.MeshStandardMaterial({ color: 0xf5eeee, roughness: 0.3 });

            for (let i = 0; i < 30; i++) {
                const eyeGroup = new THREE.Group();
                const sclera = new THREE.Mesh(eyeGeo, scleraMat);
                eyeGroup.add(sclera);
                const pupil = new THREE.Mesh(pupilGeo, pupilMat);
                pupil.position.z = 0.16; 
                eyeGroup.add(pupil);
                
                let angle = Math.random() * Math.PI * 2;
                let height = (Math.random() - 0.5) * 4.2;
                let radius = 0.85; 
                eyeGroup.position.set(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
                
                monster.add(eyeGroup);
                monsterEyes.push(eyeGroup);
            }
            monster.position.set(0, -10, 0); 
            scene.add(monster);

            // Senter
            const flashlight = new THREE.SpotLight(0xffffff, 2.5, 35, Math.PI / 5, 0.6, 1);
            camera.add(flashlight);
            flashlight.position.set(0, 0, 0);
            flashlight.target = new THREE.Object3D();
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -1);
            scene.add(camera);

            for(let z = -100; z >= -900; z -= 100) {
                let light = new THREE.PointLight(0x667766, 0.5, 20);
                light.position.set(0, 4.5, z);
                scene.add(light);
                lights.push(light);
            }

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body && !gameOver) {
                    camera.rotation.y -= e.movementX * config.sensitivity; 
                    camera.rotation.x -= e.movementY * config.sensitivity; 
                    camera.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, camera.rotation.x));
                }
            });

            window.addEventListener('click', () => {
                if (gameActive && !gameOver) document.body.requestPointerLock();
            });

            window.addEventListener('keydown', (e) => handleKey(e, true));
            window.addEventListener('keyup', (e) => handleKey(e, false));
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function handleKey(e, isDown) {
            let key = e.key.toLowerCase();
            if (key === 'w') keys.w = isDown;
            if (key === 'a') keys.a = isDown;
            if (key === 's') keys.s = isDown;
            if (key === 'd') keys.d = isDown;
            if (e.key === 'Shift') keys.shift = isDown;
        }

        function updateMonsterAI() {
            let playerZ = camera.position.z;
            let lang = config.lang;

            // Trigger Muncul di meter ke 500
            if (!monsterSpawned && playerZ < -500) {
                monsterSpawned = true;
                monster.position.set(0, 2, playerZ + 45); 
                monsterState = "asthma";
                monsterTimer = 0;

                // Panggil monolog panik sumpah serapah sesuai objek bahasa
                showMonologue(translations[lang].monologueChase(config.username), 6000);
            }

            if (!monsterSpawned) return;

            monsterTimer += 0.016;

            // Ambil teks deskripsi status langsung dari kamus terjemahan
            if (monsterState === "asthma") {
                monsterSpeed = 0.07; 
                document.getElementById('m-state').innerText = translations[lang].asthma;
                document.getElementById('m-state').style.color = "#ffaa00";

                if (monsterTimer > 5.0) { 
                    monsterState = "crying";
                    monsterTimer = 0;
                }
            } 
            else if (monsterState === "crying") {
                monsterSpeed = 0.23; 
                document.getElementById('m-state').innerText = translations[lang].crying;
                document.getElementById('m-state').style.color = "#ff0000";

                if (monsterTimer > 4.0) { 
                    monsterState = "asthma";
                    monsterTimer = 0;
                }
            }

            monster.position.z -= monsterSpeed;

            // Tracking mata melotot
            let targetPos = new THREE.Vector3().copy(camera.position);
            monster.worldToLocal(targetPos);
            monsterEyes.forEach(eye => { eye.lookAt(targetPos); });

            monster.children[0].scale.x = 1 + Math.sin(monsterTimer * 8) * 0.05;
            monster.children[0].scale.z = 1 + Math.cos(monsterTimer * 8) * 0.05;
        }

        function animate() {
            if (gameOver || !gameActive) return;

            requestAnimationFrame(animate);

            lights.forEach(l => { if (Math.random() > 0.98) l.intensity = Math.random() * 1.2; });

            let speed = keys.shift ? sprintSpeed : normalSpeed;
            let moveDir = new THREE.Vector3();

            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) moveDir.x -= 1;
            if (keys.d) moveDir.x += 1;
            
            moveDir.normalize();
            moveDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), camera.rotation.y);
            camera.position.addScaledVector(moveDir, speed);

            if (keys.w || keys.s || keys.a || keys.d) {
                let bobFreq = keys.shift ? 2.5 : 1.5;
                camera.position.y = 2 + Math.sin(camera.position.z * bobFreq) * 0.04;
            }

            updateMonsterAI();

            // Sisa Jarak Ter-update aman
            let currentDistance = Math.round(totalDistance - Math.abs(camera.position.z));
            if (currentDistance < 0) currentDistance = 0;
            document.getElementById('distance').innerText = currentDistance;

            if (monsterSpawned) {
                let distanceToMonster = monster.position.z - camera.position.z;
                if (distanceToMonster < 18 && distanceToMonster > 0) {
                    let shakeIntensity = (18 - distanceToMonster) * 0.015;
                    camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                }
                if (monster.position.z <= camera.position.z) endGame(false);
            }

            if (camera.position.z <= finishLine) endGame(true);

            renderer.render(scene, camera);
        }

        function endGame(isWin) {
            gameOver = true;
            document.exitPointerLock();
            const overlay = document.getElementById('screen-overlay');
            const txt = document.getElementById('overlay-text');
            overlay.classList.remove('hidden');
            
            // Translasi layar Game Over / Win
            if (isWin) {
                txt.innerText = translations[config.lang].win;
                txt.style.color = "#00ff00";
            } else {
                txt.innerText = translations[config.lang].lose;
                txt.style.color = "#ff0000";
            }
        }

        function resetGame() {
            gameOver = false;
            monsterSpawned = false;
            triggeredMonologue2 = false;
            camera.position.set(0, 2, 0);
            camera.rotation.set(0, 0, 0);
            monster.position.set(0, -10, 0);
            monsterState = "idle";
            
            // Terapkan ulang lokalisasi teks pas reset
            applyLocalization();
            
            document.getElementById('screen-overlay').classList.add('hidden');
            document.body.requestPointerLock();
            
            showMonologue(translations[config.lang].monologueReset(config.username), 3000);
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
