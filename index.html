<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNAF Three.js - Real 3D Hallways & Visual Cam</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background-color: #000; user-select: none; color: white; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* UI HUD */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; color: #fff; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; padding: 15px; background: rgba(0,0,0,0.4); }
        #power-display { top: 0; left: 0; border-bottom-right-radius: 10px; color: #00ff00; }
        #time-display { top: 0; right: 0; border-bottom-left-radius: 10px; text-align: right; }
        #esc-hint { bottom: 60px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #aaa; display: none; }
        
        /* Buttons */
        .btn { position: absolute; pointer-events: auto; background: rgba(40, 40, 40, 0.9); color: white; border: 2px solid #666; padding: 12px 24px; cursor: pointer; font-weight: bold; font-family: monospace; }
        .btn:hover { background: #555; }
        #btn-left { bottom: 50%; left: 20px; border-left: 5px solid #ff0000; }
        #btn-right { bottom: 50%; right: 20px; border-right: 5px solid #ff0000; }
        .btn-closed { background: #990000 !important; color: #fff; }
        
        #btn-monitor { bottom: 10px; left: 50%; transform: translateX(-50%); width: 30%; height: 40px; background: rgba(0, 0, 100, 0.4); border: 2px solid #00f; text-align: center; font-size: 16px; }

        /* ====== CAMERA MONITOR (VISUAL REAL) ====== */
        #camera-screen { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; pointer-events: auto; z-index: 20; box-sizing: border-box;
        }
        /* Efek Garis Khas CCTV */
        #camera-screen::after {
            content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.04), rgba(0, 255, 0, 0.04) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
        }
        
        /* Wadah Gambar CCTV */
        #cam-render-area { width: 100%; height: 100%; position: relative; background-size: cover; background-position: center; filter: brightness(0.7) contrast(1.3) grayscale(0.5); }
        
        .cam-overlay { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 24px; font-weight: bold; text-shadow: 0 0 5px #000; }
        .blink-dot { inline-block; width: 15px; height: 15px; background: red; border-radius: 50%; display: inline-block; margin-right: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* DENAH MAP CCTV */
        #map-container { position: absolute; bottom: 40px; right: 40px; width: 220px; height: 200px; background: rgba(0, 20, 0, 0.85); border: 2px solid #0f0; padding: 10px; color: #0f0; }
        .map-layout { position: relative; width: 100%; height: 150px; border: 2px solid #0f0; margin-top: 10px; }
        .map-cam-btn { position: absolute; background: #020; border: 1px solid #0f0; color: #0f0; padding: 4px 6px; font-size: 11px; cursor: pointer; }
        .map-cam-btn:hover, .active-cam { background: #0f0; color: #000; font-weight: bold; }
        
        /* Posisi Tombol di Denah */
        #cam1-btn { top: 10px; left: 75px; }   /* Stage */
        #cam2-btn { top: 60px; left: 75px; }   /* Dining Hall */
        #cam3-btn { bottom: 50px; left: 15px; } /* Left Hallway */
        #cam4-btn { bottom: 50px; right: 15px; }/* Right Hallway */
        #map-office { position: absolute; bottom: 5px; left: 80px; width: 50px; height: 30px; border: 2px dashed #0f0; text-align: center; line-height: 30px; font-size: 11px; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <div id="power-display" class="hud">BATERAI: <span id="power-val">100</span>%</div>
        <div id="time-display" class="hud">12 AM<br><span style="font-size:12px">Malam 1</span></div>
        <div id="esc-hint" class="hud">Tekan [ESC] untuk Keluar Monitor</div>
        
        <button id="btn-left" class="btn" onclick="toggleLeftDoor()">PINTU KIRI</button>
        <button id="btn-right" class="btn" onclick="toggleRightDoor()">PINTU KANAN</button>
        <button id="btn-monitor" class="btn" onclick="toggleMonitor()">▲ LIHAT MONITOR ▲</button>
    </div>

    <div id="camera-screen">
        <div id="cam-render-area">
            <div class="cam-overlay"><span class="blink-dot"></span><span id="cam-name-text">CAM 1 - SHOW STAGE</span></div>
            
            <div id="map-container">
                <div style="text-align:center; font-weight:bold; font-size:12px;">DENAH AREA</div>
                <div class="map-layout">
                    <button id="cam1-btn" class="map-cam-btn active-cam" onclick="selectCamera(1)">CAM 1</button>
                    <button id="cam2-btn" class="map-cam-btn" onclick="selectCamera(2)">CAM 2</button>
                    <button id="cam3-btn" class="map-cam-btn" onclick="selectCamera(3)">CAM 3</button>
                    <button id="cam4-btn" class="map-cam-btn" onclick="selectCamera(4)">CAM 4</button>
                    <div id="map-office">OFFICE</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SETUP THREE.JS (MAP REAL BERLORONG) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.12); // Lorong makin jauh makin gelap gulita

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 1); // Posisi duduk di kantor

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- 2. MODULASI GEOMETRI RUANGAN (Bukan Kotak Tertutup Lagi) ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x252525, roughness: 0.9 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.7 });

        // Kantor Tengah (Tempat Pemain)
        const officeFloor = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), floorMat);
        officeFloor.rotation.x = -Math.PI / 2;
        officeFloor.position.y = -2.5;
        scene.add(officeFloor);

        const officeBackWall = new THREE.Mesh(new THREE.PlaneGeometry(6, 5), wallMat);
        officeBackWall.position.set(0, 0, 3); // Dinding belakang pemain
        scene.add(officeBackWall);

        const officeFrontWall = new THREE.Mesh(new THREE.PlaneGeometry(6, 5), wallMat);
        officeFrontWall.position.set(0, 0, -3); // Dinding depan (meja)
        scene.add(officeFrontWall);

        // MEJA KANTOR
        const desk = new THREE.Mesh(new THREE.BoxGeometry(4, 0.8, 1.5), new THREE.MeshStandardMaterial({color: 0x3a1d00}));
        desk.position.set(0, -2.1, -2);
        scene.add(desk);

        // LORONG KIRI (Tembus keluar dari sisi kiri kantor)
        const leftHallway = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 3), wallMat);
        leftHallway.position.set(-8, 0, 0); // Memanjang ke kiri sepanjang 10 unit
        scene.add(leftHallway);

        // LORONG KANAN (Tembus keluar dari sisi kanan kantor)
        const rightHallway = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 3), wallMat);
        rightHallway.position.set(8, 0, 0); // Memanjang ke kanan sepanjang 10 unit
        scene.add(rightHallway);

        // --- 3. PINTU 3D ---
        const doorGeo = new THREE.BoxGeometry(0.2, 5, 3);
        const doorMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6 });
        
        const leftDoor = new THREE.Mesh(doorGeo, doorMat);
        leftDoor.position.set(-2.9, 0, 0); // Tepat di batas Kantor dan Lorong Kiri
        scene.add(leftDoor);

        const rightDoor = new THREE.Mesh(doorGeo, doorMat);
        rightDoor.position.set(2.9, 0, 0); // Tepat di batas Kantor dan Lorong Kanan
        scene.add(rightDoor);

        // --- 4. MONSTER 3D (FISIK REAL) ---
        // Kita bikin monster berwujud siluet hitam tinggi mata menyala merah di lorong 3D!
        const monsterGroup = new THREE.Group();
        
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.6, 3.5, 8);
        const bodyMat = new THREE.MeshBasicMaterial({ color: 0x050505 }); // Sangat hitam gelap
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        monsterGroup.add(bodyMesh);

        // Mata Merah Menyala
        const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat); leftEye.position.set(0.3, 1.5, 0.4);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat); rightEye.position.set(0.3, 1.5, -0.4);
        monsterGroup.add(leftEye, rightEye);

        // Sembunyikan dulu jauh di luar peta saat awal game
        monsterGroup.position.set(-20, -0.8, 0); 
        scene.add(monsterGroup);

        // --- 5. LIGHTING / PENCAHAYAAN KANTOR ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.25); // Cahaya dasar sekeliling kantor
        scene.add(ambientLight);

        const officeCeilingLight = new THREE.PointLight(0xffeedd, 0.9, 8); // Lampu plafon
        officeCeilingLight.position.set(0, 2, 0);
        scene.add(officeCeilingLight);

        // --- 6. DATABASE GAMBAR CCTV (VISUAL REAL MONSTER) ---
        // Menggunakan aset gambar real bertema ruangan gelap & siluet monster fnaf-like
        const cctvImages = {
            1: { // Stage
                empty: "https://images.unsplash.com/photo-1514306191717-452ec28c7814?q=80&w=600&auto=format&fit=crop", // Panggung kosong gelap
                monster: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=600&auto=format&fit=crop" // Ada bayangan monster berdiri
            },
            2: { // Dining Hall
                empty: "https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?q=80&w=600&auto=format&fit=crop", // Lorong restoran kosong
                monster: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=600&auto=format&fit=crop" // Siluet menakutkan
            },
            3: { // Lorong Kiri
                empty: "https://images.unsplash.com/photo-1509803874385-db7c23652552?q=80&w=600&auto=format&fit=crop", // Lorong berasap kosong
                monster: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop" // Monster mendekat
            },
            4: { // Lorong Kanan
                empty: "https://images.unsplash.com/photo-1536566482680-fca31930a0bd?q=80&w=600&auto=format&fit=crop",
                monster: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=600&auto=format&fit=crop"
            }
        };

        const camNames = { 1: "CAM 1 - SHOW STAGE", 2: "CAM 2 - DINING AREA", 3: "CAM 3 - LEFT HALLWAY", 4: "CAM 4 - RIGHT HALLWAY" };

        // --- 7. LOGIKA GAMEPLAY & AI ---
        let power = 100;
        let leftDoorOpen = true;
        let rightDoorOpen = true;
        let monitorOpen = false;
        let currentCam = 1;
        let monsterLocation = 1; // 1: Stage, 2: Dining, 3: Lorong Kiri, 'DOOR_L': Tepat depan pintu, 'OFFICE': Jumpscare
        let gameOver = false;

        function moveMonsterAI() {
            if (gameOver) return;
            const roll = Math.random();

            if (monsterLocation === 1) {
                if (roll > 0.5) monsterLocation = 2; // Dari stage ke Dining Hall
            } else if (monsterLocation === 2) {
                if (roll > 0.4) monsterLocation = 3; // Dari Dining ke Lorong Kiri
                else if (roll > 0.1) monsterLocation = 1; // Mundur ke stage
            } else if (monsterLocation === 3) {
                if (roll > 0.5) {
                    monsterLocation = 'DOOR_L';
                    // PINDAHKAN MONSTER 3D NYATA KE DEPAN PINTU KIRI PEMAIN!
                    monsterGroup.position.set(-3.8, -0.8, 0); 
                    monsterGroup.rotation.y = Math.PI / 2; // Menghadap ke pemain
                } else if (roll > 0.2) {
                    monsterLocation = 2; // Mundur ke dining
                    monsterGroup.position.set(-20, -0.8, 0); // Sembunyikan mesh 3D lagi
                }
            } else if (monsterLocation === 'DOOR_L') {
                if (!leftDoorOpen) {
                    // Pintu tertutup! Monster gagal masuk dan mundur ke Dining area
                    monsterLocation = 2;
                    monsterGroup.position.set(-20, -0.8, 0);
                    console.log("Monster diblokir pintu! Mundur ke Dining Hall.");
                } else {
                    // Pintu terbuka? Jumpscare!
                    monsterLocation = 'OFFICE';
                    triggerJumpscare();
                }
            }

            console.log("Lokasi Monster Saat Ini: " + monsterLocation);
            if (monitorOpen) updateMonitorView();
        }
        setInterval(moveMonsterAI, 6000); // Sistem AI berhitung setiap 6 detik

        // CONTROLS & ESCAPE INPUT KEY
        window.addEventListener('keydown', (e) => {
            // FIX: JIKA PENCET ESCAPE, MONITOR LANGSUNG KELUAR!
            if (e.key === "Escape" || e.key === "Esc") {
                if (monitorOpen) {
                    toggleMonitor();
                }
            }
        });

        function toggleLeftDoor() {
            if (power <= 0 || gameOver) return;
            leftDoorOpen = !leftDoorOpen;
            document.getElementById('btn-left').className = leftDoorOpen ? "btn" : "btn btn-closed";
        }

        function toggleRightDoor() {
            if (power <= 0 || gameOver) return;
            rightDoorOpen = !rightDoorOpen;
            document.getElementById('btn-right').className = rightDoorOpen ? "btn" : "btn btn-closed";
        }

        function toggleMonitor() {
            if (power <= 0 || gameOver) return;
            monitorOpen = !monitorOpen;
            
            document.getElementById('camera-screen').style.display = monitorOpen ? 'block' : 'none';
            document.getElementById('esc-hint').style.display = monitorOpen ? 'block' : 'none';
            
            if (monitorOpen) updateMonitorView();
        }

        function selectCamera(camId) {
            document.querySelector('.map-cam-btn.active-cam').classList.remove('active-cam');
            document.getElementById(`cam${camId}-btn`).classList.add('active-cam');
            currentCam = camId;
            updateMonitorView();
        }

        // FIX: RENDER GAMBAL REAL BERDASARKAN ADA/TIDAKNYA MONSTER
        function updateMonitorView() {
            document.getElementById('cam-name-text').innerText = camNames[currentCam];
            const renderArea = document.getElementById('cam-render-area');
            
            let status = (monsterLocation === currentCam) ? 'monster' : 'empty';
            let imgUrl = cctvImages[currentCam][status];
            
            // Ganti Background Monitor dengan gambar asli
            renderArea.style.backgroundImage = `url('${imgUrl}')`;
        }

        function triggerJumpscare() {
            gameOver = true;
            monitorOpen = false;
            document.getElementById('camera-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'none';
            
            // Kamera dipaksa melihat ke arah monster di kiri secara instan
            camera.rotation.y = Math.PI / 2;
            officeCeilingLight.color.setHex(0xff0000); // Lampu jadi merah darah
            officeCeilingLight.intensity = 5;
            
            setTimeout(() => {
                alert("JUMPSCARE! Monster berhasil menyelinap masuk lewat pintu kiri karena lu kagak tutup!");
                location.reload();
            }, 500);
        }

        // --- 8. MOUSE LOOK (MENENGOK SMOOTH) ---
        let targetRotationY = 0;
        window.addEventListener('mousemove', (event) => {
            if (monitorOpen || gameOver) return;
            const mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            targetRotationY = -mouseX * (Math.PI / 2.5); // Bisa menengok sampai lorong kiri/kanan terlihat
        });

        // --- 9. GAME LOOP ---
        const clock = new THREE.Clock();
        let pTimer = 0;
        let gameTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (!monitorOpen && !gameOver) {
                camera.rotation.y += (targetRotationY - camera.rotation.y) * 0.15;
            }

            // Animasi Gerakan Pintu Naik-Turun Fisik
            const targetLeftY = leftDoorOpen ? 5 : 0;
            leftDoor.position.y += (targetLeftY - leftDoor.position.y) * 0.25;

            const targetRightY = rightDoorOpen ? 5 : 0;
            rightDoor.position.y += (targetRightY - rightDoor.position.y) * 0.25;

            // Pengurangan Baterai & Waktu
            if (!gameOver) {
                pTimer += delta;
                if (pTimer >= 1) {
                    let usage = 0.15;
                    if (!leftDoorOpen) usage += 0.4;
                    if (!rightDoorOpen) usage += 0.4;
                    if (monitorOpen) usage += 0.5;

                    power -= usage;
                    if (power <= 0) { power = 0; gameOver = true; officeCeilingLight.intensity = 0; alert("Mati Lampu... Selesai Lu!"); location.reload(); }
                    document.getElementById('power-val').innerText = Math.floor(power);

                    gameTime += 0.01; 
                    if (gameTime >= 6) { gameOver = true; alert("6 AM - KAMU MENANG!"); location.reload(); }
                    document.getElementById('time-display').innerHTML = `${Math.floor(gameTime) == 0 ? 12 : Math.floor(gameTime)} AM<br><span style='font-size:12px'>Malam 1</span>`;
                    pTimer = 0;
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
