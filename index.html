<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOSS SOLL - Horror Game Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; }
        #hud { position: absolute; top: 20px; left: 20px; color: #ff0000; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; }
        #monster-status { position: absolute; top: 50px; left: 20px; color: #fff; font-size: 16px; text-shadow: 1px 1px #000; }
        #instructions { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #fff; font-size: 18px; text-shadow: 1px 1px #000; }
        #screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); color: white; font-size: 40px; display: none; flex-direction: column; }
        #restart-btn { margin-top: 20px; padding: 10px 20px; font-size: 20px; cursor: pointer; background: #ff0000; color: white; border: none; }
    </style>
    <!-- Meload Three.js dari CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">Jarak ke Pintu: <span id="distance">100</span>m</div>
    <div id="monster-status">THE LOSS SOLL: <span id="m-state">Mengintai...</span></div>
    <div id="instructions">TAHAN TOMBOL [ W ] UNTUK LARI MENUJU PINTU!</div>
    
    <div id="screen-overlay" id="overlay">
        <div id="overlay-text">GAME OVER</div>
        <button id="restart-btn" onclick="resetGame()">Coba Lagi</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, player, monster, door;
        let walls = [], lights = [];
        let moveForward = false;
        let gameOver = false;
        
        // Game Settings
        const finishLine = -120; // Posisi pintu di koordinat Z
        let playerSpeed = 0.3;
        let monsterSpeed = 0.1;
        let monsterTimer = 0;
        let monsterIsSprinting = false;

        function init() {
            // 1. Setup Scene & Camera
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.15); // Kabut biar serem

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5); // Posisi mata player

            // 2. Setup Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 3. Bikin Lorong RS Jiwa (Gunakan Box raksasa yang dibalik)
            const corridorGeo = new THREE.BoxGeometry(6, 5, 150);
            // Material dinding suram pasien gangguan jiwa
            const corridorMat = new THREE.MeshStandardMaterial({ 
                color: 0x2d3e35, // Hijau lumut / rumah sakit tua
                side: THREE.BackSide,
                roughness: 0.8
            });
            const corridor = new THREE.Mesh(corridorGeo, corridorMat);
            corridor.position.set(0, 2.5, -70);
            scene.add(corridor);

            // 4. Bikin Pintu Darurat di Ujung Lorong
            const doorGeo = new THREE.BoxGeometry(2, 4, 0.2);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x5a1818, roughness: 0.5 }); // Pintu merah tua
            door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 2, finishLine);
            scene.add(door);

            // 5. Bikin Monster (THE LOSS SOLL)
            // Sementara pake bentuk bayangan merah tinggi abstrak penjelmaan jiwa
            const monsterGeo = new THREE.CylinderGeometry(0.6, 0.3, 3.5, 8);
            const monsterMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true }); 
            monster = new THREE.Mesh(monsterGeo, monsterMat);
            monster.position.set(0, 1.75, 15); // Mulai dari belakang player
            scene.add(monster);

            // 6. Pencahayaan
            // Senter Player (Flashlight)
            const flashlight = new THREE.SpotLight(0xffffff, 2, 25, Math.PI / 6, 0.5, 1);
            camera.add(flashlight);
            flashlight.position.set(0, 0, 0);
            flashlight.target = new THREE.Object3D();
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -1);
            scene.add(camera);

            // Lampu lorong kedap-kedip (Flickering)
            const hallLight = new THREE.PointLight(0xaaaaaa, 0.8, 30);
            hallLight.position.set(0, 4.5, -30);
            scene.add(hallLight);
            lights.push(hallLight);

            const hallLight2 = new THREE.PointLight(0xaaaaaa, 0.8, 30);
            hallLight2.position.set(0, 4.5, -80);
            scene.add(hallLight2);
            lights.push(hallLight2);

            // Event Listeners Kontrol
            window.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'w') moveForward = true;
            });
            window.addEventListener('keyup', (e) => {
                if (e.key.toLowerCase() === 'w') moveForward = false;
            });
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        // AI Monster Asma (THE LOSS SOLL)
        function updateMonsterLogic() {
            monsterTimer += 0.016; // Asumsi ~60fps

            if (monsterIsSprinting) {
                // Mode Lari Super Kencang (Jiwa bugar)
                monsterSpeed = 0.42; 
                document.getElementById('m-state').innerText = "DIA BERLARI KENCANG!!";
                document.getElementById('m-state').style.color = "red";
                
                if (monsterTimer > 2.5) { // Cuma kuat lari 2.5 detik karena asma
                    monsterIsSprinting = false;
                    monsterTimer = 0;
                }
            } else {
                // Mode Asma Kambuh (Napas tersengal-sengal, lari pelan banget)
                monsterSpeed = 0.08;
                document.getElementById('m-state').innerText = "*Suara Mengos-mengosan* (Asma)";
                document.getElementById('m-state').style.color = "#ffaa00";

                if (monsterTimer > 4.0) { // Istirahat/asma kambuh selama 4 detik
                    monsterIsSprinting = true;
                    monsterTimer = 0;
                }
            }

            // Monster selalu bergerak maju mengejar koordinat Z player
            monster.position.z -= monsterSpeed;
        }

        function animate() {
            if (gameOver) return;

            requestAnimationFrame(animate);

            // Lampu kedap-kedip random biar spooky
            lights.forEach(l => {
                if (Math.random() > 0.96) {
                    l.intensity = Math.random() * 1.5;
                }
            });

            // Pergerakan Player
            if (moveForward) {
                camera.position.z -= playerSpeed;
                // Efek kamera goyang pas lari (head bobbing)
                camera.position.y = 2 + Math.sin(camera.position.z * 1.5) * 0.05;
            }

            // Update AI Monster
            updateMonsterLogic();

            // Hitung sisa jarak ke pintu
            let distanceToDoor = Math.round(camera.position.z - finishLine);
            if (distanceToDoor < 0) distanceToDoor = 0;
            document.getElementById('distance').innerText = distanceToDoor;

            // Efek kamera gemetar kalau monster udah deket banget (Screen Shake)
            let distanceToMonster = monster.position.z - camera.position.z;
            if (distanceToMonster < 8 && distanceToMonster > 0) {
                camera.position.x = (Math.random() - 0.5) * 0.05;
            } else {
                camera.position.x = 0;
            }

            // CEK KONDISI MENANG ATAU KALAH
            // 1. Kalah: Jarak monster melampaui atau menyentuh player
            if (monster.position.z <= camera.position.z) {
                endGame(false);
            }
            // 2. Menang: Player nyampe pintu darurat
            if (camera.position.z <= finishLine) {
                endGame(true);
            }

            renderer.render(scene, camera);
        }

        function endGame(isWin) {
            gameOver = true;
            const overlay = document.getElementById('screen-overlay');
            const txt = document.getElementById('overlay-text');
            overlay.style.display = 'flex';
            
            if (isWin) {
                txt.innerText = "KAMU BERHASIL LOLOS!";
                txt.style.color = "#00ff00";
            } else {
                txt.innerText = "THE LOSS SOLL MEMAKAN JIWAMU!";
                txt.style.color = "#ff0000";
            }
        }

        function resetGame() {
            gameOver = false;
            camera.position.set(0, 2, 5);
            monster.position.set(0, 1.75, 15);
            monsterTimer = 0;
            monsterIsSprinting = false;
            document.getElementById('screen-overlay').style.display = 'none';
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Jalankan game pertama kali
        init();
    </script>
</body>
</html>
